name: CI — Bank Churn Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & format check ───────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: Ruff lint
        run: ruff check src/ app/ scripts/ tests/ --ignore E501

  # ── Unit & integration tests ─────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/test_api.py \
            -q

      - name: Run API tests (with mocks)
        run: |
          pytest tests/test_api.py -v --tb=short -q

  # ── Data validation ───────────────────────────────────────────────────
  validate:
    name: Data validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Great Expectations
        run: |
          # Only run if sample data exists
          if [ -f "data/raw/bank_customers.csv" ]; then
            python great_expectations/validate.py --strict
          else
            echo "No data file found — skipping validation"
          fi

  # ── Docker build check ────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile \
            -t bank-churn-api:ci \
            .

      - name: Smoke test container
        run: |
          docker run -d --name churn_test -p 8000:8000 bank-churn-api:ci
          sleep 10
          curl -f http://localhost:8000/health || true
          docker stop churn_test
          docker rm churn_test
