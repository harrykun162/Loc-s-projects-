version: "3.9"

services:

  # ── Churn prediction API ─────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bank_churn_api
    ports:
      - "8000:8000"
    volumes:
      - ../artifacts:/app/artifacts      # persist trained models
      - ../data:/app/data                # persist data
      - ../mlruns:/app/mlruns            # persist MLflow runs
    env_file:
      - ../.env
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      APP_ENV:  "production"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ── MLflow tracking server ───────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: bank_churn_mlflow
    command: >
      sh -c "pip install mlflow --quiet &&
             mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri /mlruns
               --default-artifact-root /mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/mlruns
    restart: unless-stopped

networks:
  default:
    name: bank_churn_net
